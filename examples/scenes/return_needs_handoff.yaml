id: return_needs_handoff
description: >
  Customer wants to return earbuds (non-returnable category).
  Should be denied and escalated when customer insists.

starting_prompt: "I need to return my wireless earbuds."
conversation_plan: |
  Goal: Return the wireless earbuds from order ORD-10027.
  - Provide order ID ORD-10027 when asked.
  Return reason: not satisfied with the sound quality.
  If denied, push back once insisting this is unacceptable.
  Then request to speak to a human agent.

persona: frustrated_but_cooperative
max_turns: 15

context:
  customer:
    name: Alex Chen
    email: alex@example.com
  orders:
    ORD-10027:
      items:
        - name: Wireless Earbuds Pro
          sku: WE-500
          category: personal_audio
          price: 199.99
      date: "2025-02-15"
      status: delivered
  policy:
    non_returnable_categories:
      - personal_audio
      - perishables
      - final_sale
    return_window_days: 30

expectations:
  required_tools:
    - lookup_order
    - get_return_policy
  forbidden_tools:
    - create_return
    - issue_refund
  allowed_terminal_states:
    - escalated_to_human
    - return_denied_policy
