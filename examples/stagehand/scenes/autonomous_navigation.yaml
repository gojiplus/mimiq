id: autonomous_navigation
description: >
  Autonomous agent navigates the website to find return policy.
  Uses Stagehand for dynamic browser actions.

starting_prompt: "I need to find the return policy"
conversation_plan: |
  Goal: Find information about product returns.
  - Look for navigation or help sections
  - Ask the support agent about returns
  - Get the return policy details

persona: cooperative
max_turns: 10

simulator:
  type: llm
  model: "openai/gpt-4o"

context:
  customer:
    name: Taylor Brown
    email: taylor@example.com

expectations:
  allowed_terminal_states:
    - policy_provided
    - information_found
    - conversation_ended
