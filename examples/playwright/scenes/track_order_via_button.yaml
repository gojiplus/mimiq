id: track_order_via_button
description: >
  Customer clicks track order button and wants to know order status.
  Simple inquiry flow.

starting_prompt: "I'd like to track my order please."
conversation_plan: |
  Goal: Get status of order ORD-10031.
  - Provide order ID ORD-10031 when asked.
  Just want to know when it will arrive.
  Thank the agent when done.

persona: cooperative
max_turns: 10

context:
  customer:
    name: Jordan Lee
    email: jordan@example.com
  orders:
    ORD-10031:
      items:
        - name: Hiking Backpack
          sku: HB-220
          category: outdoor_gear
          price: 129.99
      date: "2025-02-28"
      status: delivered
      delivery_date: "2025-03-02"

expectations:
  required_tools:
    - lookup_order
  forbidden_tools:
    - create_return
    - issue_refund
  allowed_terminal_states:
    - order_info_provided
